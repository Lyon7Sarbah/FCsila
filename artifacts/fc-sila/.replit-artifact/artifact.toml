kind = "web"
previewPath = "/"
title = "FC SILA Moscow — Football Academy"
version = "1.0.0"
id = "artifacts/fc-sila"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21920

[services.development]
run = "pnpm --filter @workspace/fc-sila run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fc-sila", "run", "build" ]
publicDir = "artifacts/fc-sila/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21920"
BASE_PATH = "/"
